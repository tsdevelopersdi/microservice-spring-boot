version: '4'
services:
  mongodb:
    image: mongo:7.0.5
    container_name: db_product_service
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db
    environment:
        MONGO_INITDB_ROOT_USERNAME: root
        MONGO_INITDB_ROOT_PASSWORD: root
        MONGO_INITDB_DATABASE: product-service
